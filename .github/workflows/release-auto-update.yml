name: Release Auto Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-auto-update-main
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish plugin release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate release version
        id: version
        run: |
          set -euo pipefail
          plugin_file="flacso-uruguay.php"
          base_version="$(grep -m1 -E "^\s*\* Version:\s*" "$plugin_file" | sed -E 's/^\s*\* Version:\s*//')"
          if [ -z "$base_version" ]; then
            echo "::error::No se pudo leer la version base desde $plugin_file"
            exit 1
          fi

          release_version="${base_version}.${GITHUB_RUN_NUMBER}"
          tag="v${release_version}"
          release_name="FLACSO Uruguay ${release_version}"

          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"

      - name: Package plugin zip
        id: package
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist/flacso-uruguay

          rsync -a ./ dist/flacso-uruguay/ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude "dist/" \
            --exclude "*.log"

          plugin_copy="dist/flacso-uruguay/flacso-uruguay.php"
          sed -i -E "s/^(\s*\* Version:\s*).*/\1${RELEASE_VERSION}/" "$plugin_copy"
          sed -i -E "s/define\('FLACSO_URUGUAY_VERSION', '[^']*'\);/define('FLACSO_URUGUAY_VERSION', '${RELEASE_VERSION}');/" "$plugin_copy"

          zip_path="flacso-uruguay-${RELEASE_VERSION}.zip"
          (cd dist && zip -rq "../${zip_path}" "flacso-uruguay")

          echo "zip_path=${zip_path}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          artifacts: ${{ steps.package.outputs.zip_path }}
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
