name: Encoding Guard

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  encoding-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for BOM, mojibake and UTF-8 issues
        run: python .github/scripts/check_encoding.py
